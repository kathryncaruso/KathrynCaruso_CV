name: Overleaf Sync

on:
  schedule:
    - cron: "0 */6 * * *"  # Runs every 6 hours
  workflow_dispatch:  # Allows you to manually trigger it too

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch latest from Overleaf
        uses: subhamx/overleaf_sync_with_git@master
        with:
          OVERLEAF_PROJECT_ID: ${{ secrets.OVERLEAF_PROJECT_ID }}
          OVERLEAF_COOKIE: ${{ secrets.OVERLEAF_COOKIE }}

      - uses: actions/checkout@v4
        with:
          path: repo/

      - name: Copy Overleaf files into repo
        run: |
          cp -r artifacts/* repo/

      - name: Check for changes
        id: check
        run: |
          cd repo/
          git add .
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      - name: Compile LaTeX document
        if: steps.check.outputs.changed == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: repo/

      - name: Commit and push all changes
        if: steps.check.outputs.changed == 'true'
        run: |
          cd repo/
          git config user.name "Overleaf Sync Bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Sync from Overleaf and compile PDF"
          git pull --rebase
          git push
